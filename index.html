<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Link Generator</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

  <div class="container">

    <!-- Logo -->
    <div id="logo">
      <div class="bubble">
        <span class="symbol">#</span>
      </div>
      <span class="logo-text">WA Linker</span>
    </div>

    <h2>WhatsApp Bulk Link Tool</h2>

    <textarea id="numbers" placeholder="Enter numbers (one per line)"></textarea>

    <textarea id="Message" placeholder="Enter message"></textarea>

    <button id="generateBtn">Generate Links</button>

    <h3>Messages Sent: <span id="counter">0</span></h3>

    <div id="links"></div>

    <h3>Sent Numbers</h3>
    <div id="sentBox"></div>

  </div>
  <div>
  <p class="disclaimer">
  For personal use only. Avoid spam. This tool does not send messages automatically.
  </p>
  </div>
  <script src="App.js"></script>
</body>
      </html>
